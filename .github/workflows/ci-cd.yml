name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────
  # CI – Build check (chạy trên mọi push và PR)
  # ────────────────────────────────────────────────────────────────
  ci:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend (NestJS) ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Build backend (TypeScript compile check)
        working-directory: apps/backend
        run: npm run build

      # ── Frontend (Next.js) ────────────────────────────────────────
      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build frontend (Next.js build check)
        working-directory: apps/frontend
        run: npm run build
        env:
          # Dùng giá trị dummy cho build check – không cần backend thật
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ────────────────────────────────────────────────────────────────
  # CD – Trigger deploy (chỉ chạy khi push vào main, sau khi CI pass)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: ci
    # Chỉ deploy khi push trực tiếp vào main (không deploy với PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send deploy webhook to server
        run: |
          echo "Triggering deploy on server..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"ref":"${{ github.ref }}","sha":"${{ github.sha }}","message":"${{ github.event.head_commit.message }}"}' \
            --max-time 30)

          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "✅ Deploy webhook triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Webhook failed with HTTP $RESPONSE"
            exit 1
          fi

      - name: Print deployment info
        run: |
          echo "─────────────────────────────────"
          echo "📦 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "💬 Message: ${{ github.event.head_commit.message }}"
          echo "🚀 Deploy triggered at: $(date -u)"
          echo "─────────────────────────────────"
