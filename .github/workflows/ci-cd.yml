name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────
  # CI – Build check (chạy trên mọi push và PR)
  # ────────────────────────────────────────────────────────────────
  ci:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node một lần cho cả project (monorepo dùng 1 package-lock.json ở root)
      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          # package-lock.json nằm ở root của monorepo, không phải trong workspace con
          cache-dependency-path: package-lock.json

      # Cài toàn bộ dependencies từ root (npm workspaces)
      - name: Install all dependencies
        run: npm ci

      # ── Backend (NestJS) ──────────────────────────────────────────
      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Build backend (TypeScript compile check)
        run: npm run build:backend

      # ── Frontend (Next.js) ────────────────────────────────────────
      - name: Build frontend (Next.js build check)
        run: npm run build:frontend
        env:
          # Dùng giá trị dummy cho build check – không cần backend thật
          NEXT_PUBLIC_API_URL: http://localhost:3001/api

  # ────────────────────────────────────────────────────────────────
  # CD – Trigger deploy (chỉ chạy khi push vào main, sau khi CI pass)
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: ci
    # Chỉ deploy khi push trực tiếp vào main (không deploy với PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send deploy webhook to server
        # Truyền secrets qua env vars (an toàn hơn inline trong script)
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          # Kiểm tra secret đã cấu hình chưa
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL chưa được cấu hình trong GitHub Secrets."
            echo "Skipping deploy – xem scripts/README.md để thiết lập ngrok + webhook."
            exit 0
          fi

          echo "Triggering deploy on server..."
          HTTP_CODE=$(curl -s -o /tmp/webhook_resp.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d "{\"ref\":\"$GITHUB_REF\",\"sha\":\"$GITHUB_SHA\",\"actor\":\"$GITHUB_ACTOR\"}" \
            --max-time 30) || HTTP_CODE="000"

          echo "Server response (HTTP $HTTP_CODE):"
          cat /tmp/webhook_resp.txt 2>/dev/null || true

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 202 ]; then
            echo "Deploy webhook triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "Webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Print deployment info
        run: |
          echo "---------------------------------"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          echo "Deploy triggered at: $(date -u)"
          echo "---------------------------------"
