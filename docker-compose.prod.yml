# docker-compose.prod.yml
# Dùng cho production deployment trên server
# Khác với docker-compose.yml (dev):
#   - Không mount source code volume
#   - Build production stage của Dockerfile
#   - Đọc .env.production thay vì .env
#   - Backend/frontend KHÔNG expose port ra host (chỉ qua nginx)

services:
  postgres:
    image: postgres:16-alpine
    container_name: eedemo_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eedemo_db}
      POSTGRES_USER: ${POSTGRES_USER:-eedemo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eedemo} -d ${POSTGRES_DB:-eedemo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: production
    container_name: eedemo_backend
    restart: always
    env_file:
      - .env.production
    environment:
      # Backend dùng service name "postgres" thay vì localhost (Docker internal DNS)
      DATABASE_URL: postgresql://${POSTGRES_USER:-eedemo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eedemo_db}?schema=public
      NODE_ENV: production
    # expose: chỉ accessible trong Docker network, không ra host
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: production
      args:
        # NEXT_PUBLIC_API_URL phải được truyền vào lúc BUILD TIME vì Next.js
        # bake biến NEXT_PUBLIC_* vào JS bundle – không thể thay đổi ở runtime
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: eedemo_frontend
    restart: always
    env_file:
      - .env.production
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    # expose: chỉ accessible trong Docker network, không ra host
    expose:
      - "3000"
    depends_on:
      - backend

  # ── Nginx – Entry point duy nhất ra ngoài ────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: eedemo_nginx
    restart: always
    ports:
      # Chỉ nginx expose port ra host
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata_prod:
    driver: local

networks:
  default:
    name: eedemo_prod_network
