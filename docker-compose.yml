services:
  postgres:
    image: postgres:16-alpine
    container_name: eedemo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eedemo_db}
      POSTGRES_USER: ${POSTGRES_USER:-eedemo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eedemo_pass}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eedemo} -d ${POSTGRES_DB:-eedemo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: eedemo_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL để backend container dùng service name "postgres" thay vì localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-eedemo}:${POSTGRES_PASSWORD:-eedemo_pass}@postgres:5432/${POSTGRES_DB:-eedemo_db}?schema=public
      NODE_ENV: development
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./apps/backend:/app
      # Giữ node_modules của container, không bị overwrite bởi host mount
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    # CMD trong Dockerfile đã bao gồm prisma migrate deploy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: eedemo_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # NEXT_PUBLIC_API_URL phải là địa chỉ mà BROWSER của người dùng có thể truy cập
      # Khi dev với Docker: browser truy cập qua host port → dùng localhost
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: eedemo_network
