# ──────────────────────────────────────────────────────────────────
# nginx.dev.conf – Development
# Hỗ trợ Next.js HMR (Hot Module Replacement) qua WebSocket
# ──────────────────────────────────────────────────────────────────

upstream backend_upstream {
    server backend:3001;
}

upstream frontend_upstream {
    server frontend:3000;
}

# Map để hỗ trợ WebSocket upgrade header (cần cho Next.js HMR)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;
    proxy_read_timeout 120s;

    # ── Health check ──────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API routes → NestJS Backend ───────────────────────────────
    location /api {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Next.js HMR WebSocket (hot reload khi dev) ───────────────
    location /_next/webpack-hmr {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s; # Giữ WebSocket mở lâu
    }

    # ── Frontend → Next.js ────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
